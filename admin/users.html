<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - PDF 管理后台</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .topbar-nav-link.active {
      color: #fff;
      background: rgba(255,255,255,.18);
      font-weight: 500;
    }
    .role-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .role-badge.admin {
      background: #eef1ff;
      color: var(--primary);
    }
    .role-badge.user {
      background: #f0f0f0;
      color: var(--text-secondary);
    }
    .btn-role {
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-role:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }
    .col-username { min-width: 120px; }
    .col-role { width: 140px; }
    .col-time { width: 180px; }
    .col-action { width: 160px; }
    .user-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .user-table thead {
      background: #fafbfc;
    }
    .user-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .user-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: var(--text);
      vertical-align: middle;
    }
    .user-table tbody tr:hover { background: #fafbfc; }
    .user-table tbody tr:last-child td { border-bottom: none; }
    .current-user {
      color: var(--text-muted);
      font-size: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body class="admin-page">
  <div class="topbar">
    <div class="topbar-bg"></div>
    <div class="server-section">
      <div class="brand-logo">
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="2" width="24" height="28" rx="3" fill="white" fill-opacity="0.2"/>
          <rect x="7" y="7" width="18" height="2" rx="1" fill="white" fill-opacity="0.8"/>
          <rect x="7" y="12" width="14" height="2" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="7" y="17" width="16" height="2" rx="1" fill="white" fill-opacity="0.6"/>
          <rect x="7" y="22" width="10" height="2" rx="1" fill="white" fill-opacity="0.6"/>
        </svg>
        <div class="brand-text">
          <span class="brand-name">PDF 文件管理</span>
          <span class="brand-sub">用户管理</span>
        </div>
      </div>
    </div>
    <div class="user-info">
      <a class="topbar-nav-link" href="/admin/index.html">管理后台</a>
      <a class="topbar-nav-link active" href="/admin/users.html">用户管理</a>
      <a class="topbar-nav-link" href="/admin/docs.html" target="_blank">使用文档</a>
      <a class="topbar-nav-link" href="/download/chrome-resume-plugin.zip" download>下载插件</a>
      <span id="displayUsername"></span>
      <button class="btn btn-ghost btn-logout" id="btnLogout">退出登录</button>
    </div>
  </div>

  <div class="main-content">
    <div class="file-header">
      <h2>用户管理</h2>
      <span class="file-count" id="userCount"></span>
    </div>

    <div class="table-wrapper">
      <table class="user-table" id="userTable">
        <thead>
          <tr>
            <th>用户名</th>
            <th>角色</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userTableBody">
          <tr><td colspan="4" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer class="page-footer">
    <div class="footer-content">
      <span class="footer-text">PDF Resume Manager v1.0</span>
      <span class="footer-dot">·</span>
      <span class="footer-text">简历智能解析 · 云端安全存储</span>
    </div>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    (function() {
      var savedServer = localStorage.getItem('selectedServer');
      var API_BASE = savedServer || window.location.origin;

      var token = localStorage.getItem('token');
      var username = localStorage.getItem('username');
      if (!token) { window.location.href = '/admin/login.html'; }
      document.getElementById('displayUsername').textContent = username;

      var currentUserId = null;
      var currentUserRole = null;

      var userTableBody = document.getElementById('userTableBody');
      var userCount = document.getElementById('userCount');
      var toast = document.getElementById('toast');

      function showToast(msg, isError) {
        toast.textContent = msg; toast.className = 'toast';
        if (isError) toast.classList.add('error');
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 3000);
      }

      function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.textContent = String(str);
        return div.innerHTML;
      }

      function formatTime(dateStr) {
        if (!dateStr) return '-';
        var d = new Date(dateStr.replace(' ', 'T'));
        function pad(n) { return String(n).padStart(2, '0'); }
        return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }

      function logout() {
        if (!confirm('确定要退出登录吗？')) return;
        localStorage.removeItem('token'); localStorage.removeItem('username');
        window.location.href = '/admin/login.html';
      }

      // 先检查 admin 身份
      async function init() {
        try {
          var res = await fetch(API_BASE + '/api/admin/check', {
            headers: { 'Authorization': 'Bearer ' + token },
          });
          var data = await res.json();
          if (data.code !== 200 || data.data.role !== 'admin') {
            showToast('权限不足，仅管理员可访问', true);
            setTimeout(function() { window.location.href = '/admin/index.html'; }, 1500);
            return;
          }
          currentUserRole = data.data.role;

          // 解码 JWT 获取当前用户 id
          try {
            var payload = JSON.parse(atob(token.split('.')[1]));
            currentUserId = payload.id;
          } catch(e) {}

          await loadUsers();
        } catch (err) {
          showToast('加载失败: ' + err.message, true);
        }
      }

      async function loadUsers() {
        try {
          var res = await fetch(API_BASE + '/api/admin/users', {
            headers: { 'Authorization': 'Bearer ' + token },
          });
          var data = await res.json();
          if (data.code !== 200) {
            showToast(data.message || '获取用户列表失败', true);
            return;
          }

          var users = data.data.users;
          userCount.textContent = '共 ' + users.length + ' 个用户';
          renderUserTable(users);
        } catch (err) {
          showToast('加载失败: ' + err.message, true);
        }
      }

      function renderUserTable(users) {
        if (users.length === 0) {
          userTableBody.innerHTML = '<tr><td colspan="4" class="empty-state"><div class="empty-icon">👥</div><div class="empty-text">暂无用户</div></td></tr>';
          return;
        }

        var html = '';
        users.forEach(function(u) {
          var isSelf = u.id === currentUserId;
          var roleLabel = u.role === 'admin' ? '管理员' : '普通用户';
          var roleClass = u.role === 'admin' ? 'admin' : 'user';

          html += '<tr>' +
            '<td>' + escapeHtml(u.username) + (isSelf ? '<span class="current-user">（当前用户）</span>' : '') + '</td>' +
            '<td><span class="role-badge ' + roleClass + '">' + roleLabel + '</span></td>' +
            '<td style="color:var(--text-secondary);">' + formatTime(u.created_at) + '</td>' +
            '<td>';

          if (!isSelf) {
            if (u.role === 'user') {
              html += '<button class="btn-role" data-action="promote" data-id="' + u.id + '" data-username="' + escapeHtml(u.username) + '">提升为管理员</button>';
            } else {
              html += '<button class="btn-role" data-action="demote" data-id="' + u.id + '" data-username="' + escapeHtml(u.username) + '">降级为普通用户</button>';
            }
          }

          html += '</td></tr>';
        });
        userTableBody.innerHTML = html;
      }

      // 点击事件委托
      userTableBody.addEventListener('click', async function(e) {
        var btn = e.target.closest('.btn-role');
        if (!btn) return;

        var action = btn.getAttribute('data-action');
        var userId = btn.getAttribute('data-id');
        var uname = btn.getAttribute('data-username');

        var newRole = action === 'promote' ? 'admin' : 'user';
        var actionLabel = action === 'promote' ? '提升为管理员' : '降级为普通用户';

        if (!confirm('确定要将「' + uname + '」' + actionLabel + '吗？')) return;

        btn.disabled = true;
        btn.textContent = '更新中...';

        try {
          var res = await fetch(API_BASE + '/api/admin/users/' + userId + '/role', {
            method: 'PUT',
            headers: {
              'Authorization': 'Bearer ' + token,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ role: newRole }),
          });
          var data = await res.json();
          if (data.code === 200) {
            showToast(uname + ' 已' + actionLabel);
            await loadUsers();
          } else {
            showToast(data.message || '操作失败', true);
          }
        } catch (err) {
          showToast('操作失败: ' + err.message, true);
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById('btnLogout').addEventListener('click', logout);

      init();
    })();
  </script>
</body>
</html>
